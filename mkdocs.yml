site_name: Dinekt Knowledge Wiki
site_url: https://dinekt.github.io/dinekt-wiki/
site_description: Claude Code と AI 開発の実践知識ベース by Dinekt
site_author: Dinekt

repo_name: dinekt/dinekt-wiki
repo_url: https://github.com/dinekt/dinekt-wiki

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: ja
  - tags

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/dinekt
