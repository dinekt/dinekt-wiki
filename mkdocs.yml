site_name: Dinekt Knowledge Wiki
site_url: https://dinekt.github.io/dinekt-wiki/
site_description: Claude Code と AI 開発の実践知識ベース by Dinekt
site_author: Dinekt

theme:
  name: material
  language: ja
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: black
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: ja
  - tags

markdown_extensions:
  - toc:
      permalink: "#"
      permalink_title: このセクションへのリンク
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - tables
  - attr_list
  - md_in_html
  - footnotes
  - def_list

extra:
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/dinekt_dev
      name: Dinekt on X
    - icon: material/web
      link: https://dinekt.com
      name: Dinekt 公式サイト
  generator: false

copyright: "&copy; 2026 Dinekt"
